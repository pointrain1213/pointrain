<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💰 财务记账本 (MySQL版)</title>
    <style>
        /* ===== 样式完全沿用之前的版本，可保持原样 ===== */
        :root {
            --primary: #4A6CF7;
            --primary-light: #6B8AFF;
            --primary-dark: #3458D6;
            --income: #22C55E;
            --income-bg: #ECFDF5;
            --expense: #EF4444;
            --expense-bg: #FEF2F2;
            --bg: #F0F4F8;
            --card-bg: #ffffff;
            --text: #1E293B;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s ease;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            max-width: 820px;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 12px;
        }

        h1,
        h2,
        h3 {
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 4px 0;
        }
        .app-header .logo {
            font-size: 32px;
            line-height: 1;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-header .sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: auto;
            background: var(--card-bg);
            padding: 4px 14px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 22px;
            margin-bottom: 18px;
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .card-header .icon {
            font-size: 20px;
            margin-right: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 18px 14px 14px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .stat-card .label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: -0.5px;
        }
        .stat-card .value.income {
            color: var(--income);
        }
        .stat-card .value.expense {
            color: var(--expense);
        }
        .stat-card .value.profit {
            color: var(--primary);
        }
        .stat-card .value.profit.negative {
            color: var(--expense);
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 10px;
        }
        .filter-btn {
            padding: 6px 18px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
        }
        .filter-btn:hover {
            background: #d1d9e6;
        }
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.35);
        }
        .filter-custom {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            flex-wrap: wrap;
        }
        .filter-custom label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .filter-custom input[type="date"] {
            padding: 5px 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border var(--transition);
        }
        .filter-custom input[type="date"]:focus {
            border-color: var(--primary);
        }
        .filter-custom .apply-btn {
            padding: 5px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            transition: background var(--transition);
        }
        .filter-custom .apply-btn:hover {
            background: var(--primary-dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
        }
        .form-grid .full-width {
            grid-column: 1 / -1;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .form-group select,
        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border var(--transition), box-shadow var(--transition);
            font-family: inherit;
        }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.12);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 52px;
        }
        .form-group .type-toggle {
            display: flex;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1.5px solid var(--border);
        }
        .form-group .type-toggle button {
            flex: 1;
            padding: 9px 0;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--card-bg);
            color: var(--text-secondary);
        }
        .form-group .type-toggle button.active-income {
            background: var(--income);
            color: #fff;
        }
        .form-group .type-toggle button.active-expense {
            background: var(--expense);
            color: #fff;
        }
        .submit-btn {
            grid-column: 1 / -1;
            padding: 12px 0;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
        }
        .submit-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.01);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            margin-top: 4px;
        }
        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 8px;
        }
        .chart-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-light);
            font-size: 14px;
            background: #fafbfc;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        .record-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 2px;
        }
        .record-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #fafbfc;
            border-radius: var(--radius-sm);
            transition: background var(--transition);
            position: relative;
        }
        .record-item:hover {
            background: #f1f5f9;
        }
        .record-item .type-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .record-item .type-badge.income {
            background: var(--income-bg);
            color: var(--income);
        }
        .record-item .type-badge.expense {
            background: var(--expense-bg);
            color: var(--expense);
        }
        .record-item .info {
            flex: 1;
            min-width: 0;
        }
        .record-item .info .top {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .record-item .info .top .category {
            font-weight: 600;
            font-size: 14px;
        }
        .record-item .info .top .date {
            font-size: 12px;
            color: var(--text-light);
        }
        .record-item .info .note {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .record-item .amount {
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .record-item .amount.income {
            color: var(--income);
        }
        .record-item .amount.expense {
            color: var(--expense);
        }
        .record-item .delete-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all var(--transition);
            opacity: 0.4;
            flex-shrink: 0;
        }
        .record-item .delete-btn:hover {
            opacity: 1;
            color: var(--expense);
            background: var(--expense-bg);
        }
        .record-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }
        .record-empty .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px 10px 30px;
            }
            .card {
                padding: 16px 14px;
                border-radius: 14px;
            }
            .stats-grid {
                gap: 8px;
            }
            .stat-card {
                padding: 14px 8px 12px;
            }
            .stat-card .value {
                font-size: 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .form-grid .full-width {
                grid-column: 1;
            }
            .filter-section {
                gap: 6px;
            }
            .filter-btn {
                padding: 5px 14px;
                font-size: 12px;
            }
            .filter-custom {
                margin-left: 0;
                width: 100%;
                margin-top: 4px;
            }
            .filter-custom input[type="date"] {
                flex: 1;
                min-width: 0;
            }
            .app-header h1 {
                font-size: 18px;
            }
            .app-header .sub {
                font-size: 11px;
                padding: 2px 10px;
            }
            .record-item {
                padding: 10px 10px;
                gap: 8px;
            }
            .record-item .info .note {
                max-width: 120px;
            }
            .chart-wrapper {
                height: 150px;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .record-item {
            animation: fadeSlideUp 0.25s ease;
        }
        .stat-card {
            animation: fadeSlideUp 0.3s ease;
        }

        .text-center {
            text-align: center;
        }
        .mt-4 {
            margin-top: 4px;
        }
        .gap-2 {
            gap: 8px;
        }
        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            background: #f1f5f9;
        }
        .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .connection-status .dot.online {
            background: #22C55E;
        }
        .connection-status .dot.offline {
            background: #EF4444;
        }
        .connection-status .dot.loading {
            background: #F59E0B;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Toast 提示 -->
        <div id="toast" class="toast"></div>

        <header class="app-header">
            <span class="logo">💰</span>
            <h1>财务记账本</h1>
            <span class="connection-status" id="connectionStatus">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </span>
            <span class="sub" id="recordCount">0 笔记录</span>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="label">📈 总收入</div>
                <div class="value income" id="totalIncome">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">📉 总支出</div>
                <div class="value expense" id="totalExpense">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">⚖️ 净盈亏</div>
                <div class="value profit" id="totalProfit">¥0.00</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span><span class="icon">📅</span>时间筛选</span>
            </div>
            <div class="filter-section">
                <button class="filter-btn active" data-period="today">今日</button>
                <button class="filter-btn" data-period="week">本周</button>
                <button class="filter-btn" data-period="month">本月</button>
                <button class="filter-btn" data-period="year">本年</button>
                <button class="filter-btn" data-period="all">全部</button>
                <div class="filter-custom">
                    <label>自</label>
                    <input type="date" id="filterStart" />
                    <label>至</label>
                    <input type="date" id="filterEnd" />
                    <button class="apply-btn" id="applyCustomFilter">筛选</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span><span class="icon">➕</span>添加记录</span>
            </div>
            <form id="recordForm" class="form-grid">
                <div class="form-group full-width">
                    <label>类型</label>
                    <div class="type-toggle" id="typeToggle">
                        <button type="button" class="active-income" data-type="income">💰 收入</button>
                        <button type="button" data-type="expense">💸 支出</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" required>
                        <option value="">加载中...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">金额 (¥)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
                </div>

                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required />
                </div>

                <div class="form-group full-width">
                    <label for="note">备注 (选填)</label>
                    <input type="text" id="note" placeholder="例如：午餐、工资条..." maxlength="50" />
                </div>

                <button type="submit" class="submit-btn">✅ 添加记录</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <span><span class="icon">📊</span>收支趋势</span>
                <span style="font-size:12px;color:var(--text-light);" id="chartPeriodLabel">本月</span>
            </div>
            <div class="chart-wrapper" id="chartWrapper">
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-empty" id="chartEmpty" style="display:none;">
                <span>暂无数据，添加记录后即可查看趋势 📈</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span><span class="icon">📋</span>记录明细</span>
                <span style="font-size:12px;color:var(--text-light);" id="listCount">0 条</span>
            </div>
            <div class="record-list" id="recordList">
                <div class="record-empty">
                    <span class="big-icon">⏳</span>
                    正在加载数据...
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const API_BASE = 'http://47.101.137.158:3000/api'; // 后端地址

        // ============================================================
        // 状态
        // ============================================================
        let currentType = 'income';
        let currentFilter = 'today';
        let categories = { income: [], expense: [] };
        let transactions = [];
        let stats = { income: 0, expense: 0, profit: 0, totalCount: 0 };

        // ============================================================
        // DOM 引用
        // ============================================================
        const form = document.getElementById('recordForm');
        const typeToggle = document.getElementById('typeToggle');
        const categorySelect = document.getElementById('category');
        const amountInput = document.getElementById('amount');
        const dateInput = document.getElementById('date');
        const noteInput = document.getElementById('note');
        const recordListEl = document.getElementById('recordList');
        const totalIncomeEl = document.getElementById('totalIncome');
        const totalExpenseEl = document.getElementById('totalExpense');
        const totalProfitEl = document.getElementById('totalProfit');
        const recordCountEl = document.getElementById('recordCount');
        const listCountEl = document.getElementById('listCount');
        const chartPeriodLabel = document.getElementById('chartPeriodLabel');
        const chartCanvas = document.getElementById('trendChart');
        const chartEmpty = document.getElementById('chartEmpty');
        const chartWrapper = document.getElementById('chartWrapper');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const filterStart = document.getElementById('filterStart');
        const filterEnd = document.getElementById('filterEnd');
        const applyCustom = document.getElementById('applyCustomFilter');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toastEl = document.getElementById('toast');

        // ============================================================
        // 工具函数
        // ============================================================
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatCurrency(n) {
            return '¥' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function showToast(msg, duration = 2500) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastEl._timer);
            toastEl._timer = setTimeout(() => {
                toastEl.classList.remove('show');
            }, duration);
        }

        function getTodayStr() {
            return formatDate(new Date());
        }

        function getWeekRange() {
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? 6 : day - 1;
            const mon = new Date(now);
            mon.setDate(now.getDate() - diff);
            const sun = new Date(mon);
            sun.setDate(mon.getDate() + 6);
            return { start: formatDate(mon), end: formatDate(sun) };
        }

        function getMonthRange() {
            const now = new Date();
            const start = formatDate(new Date(now.getFullYear(), now.getMonth(), 1));
            const end = formatDate(new Date(now.getFullYear(), now.getMonth() + 1, 0));
            return { start, end };
        }

        function getYearRange() {
            const now = new Date();
            const start = formatDate(new Date(now.getFullYear(), 0, 1));
            const end = formatDate(new Date(now.getFullYear(), 11, 31));
            return { start, end };
        }

        function getFilterRange() {
            switch (currentFilter) {
                case 'today':
                    return { start: getTodayStr(), end: getTodayStr() };
                case 'week':
                    return getWeekRange();
                case 'month':
                    return getMonthRange();
                case 'year':
                    return getYearRange();
                case 'all':
                    return { start: null, end: null };
                case 'custom':
                    return { start: filterStart.value || null, end: filterEnd.value || null };
                default:
                    return { start: null, end: null };
            }
        }

        function buildQueryString(params) {
            const parts = [];
            Object.entries(params).forEach(([key, value]) => {
                if (value !== null && value !== undefined && value !== '') {
                    parts.push(`${encodeURIComponent(key)}=${encodeURIComponent(value)}`);
                }
            });
            return parts.length ? '?' + parts.join('&') : '';
        }

        // ============================================================
        // API 调用
        // ============================================================
        async function apiGet(endpoint, params = {}) {
            const qs = buildQueryString(params);
            const response = await fetch(`${API_BASE}${endpoint}${qs}`);
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.message || `HTTP ${response.status}`);
            }
            return response.json();
        }

        async function apiPost(endpoint, data) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.message || `HTTP ${response.status}`);
            }
            return response.json();
        }

        async function apiDelete(endpoint) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'DELETE'
            });
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.message || `HTTP ${response.status}`);
            }
            return response.json();
        }

        // ============================================================
        // 数据加载
        // ============================================================
        async function loadCategories() {
            try {
                const [incomeRes, expenseRes] = await Promise.all([
                    apiGet('/categories', { type: 'income' }),
                    apiGet('/categories', { type: 'expense' })
                ]);
                categories.income = incomeRes.data || [];
                categories.expense = expenseRes.data || [];
                updateCategorySelect();
                return true;
            } catch (err) {
                console.error('加载分类失败:', err);
                showToast('⚠️ 加载分类失败: ' + err.message);
                return false;
            }
        }

        function updateCategorySelect() {
            const list = currentType === 'income' ? categories.income : categories.expense;
            if (list.length === 0) {
                categorySelect.innerHTML = '<option value="">暂无分类</option>';
                return;
            }
            categorySelect.innerHTML = list.map(c =>
                `<option value="${c.id}">${c.name}</option>`
            ).join('');
        }

        async function loadData() {
            const range = getFilterRange();
            try {
                const [transRes, statsRes] = await Promise.all([
                    apiGet('/transactions', {
                        start_date: range.start,
                        end_date: range.end
                    }),
                    apiGet('/stats', {
                        start_date: range.start,
                        end_date: range.end
                    })
                ]);

                transactions = transRes.data || [];
                stats = statsRes.data || { income: 0, expense: 0, profit: 0, totalCount: 0 };

                updateUI();
                return true;
            } catch (err) {
                console.error('加载数据失败:', err);
                showToast('⚠️ 加载数据失败: ' + err.message);
                return false;
            }
        }

        async function loadChartData() {
            const range = getFilterRange();
            const diffDays = range.start && range.end ?
                Math.round((new Date(range.end) - new Date(range.start)) / (1000 * 60 * 60 * 24)) + 1 :
                0;
            const groupBy = diffDays > 45 ? 'month' : 'day';

            try {
                const res = await apiGet('/chart-data', {
                    start_date: range.start,
                    end_date: range.end,
                    group_by: groupBy
                });
                renderChart(res.data || [], groupBy);
            } catch (err) {
                console.error('加载图表数据失败:', err);
                showToast('⚠️ 加载图表失败');
            }
        }

        // ============================================================
        // UI 更新
        // ============================================================
        function updateUI() {
            // Stats
            totalIncomeEl.textContent = formatCurrency(stats.income);
            totalExpenseEl.textContent = formatCurrency(stats.expense);
            totalProfitEl.textContent = formatCurrency(stats.profit);
            totalProfitEl.className = 'value profit' + (stats.profit < 0 ? ' negative' : '');

            // Counts
            recordCountEl.textContent = stats.totalCount + ' 笔记录';
            listCountEl.textContent = transactions.length + ' 条';

            // Period label
            const periodMap = {
                'today': '今日',
                'week': '本周',
                'month': '本月',
                'year': '本年',
                'all': '全部',
                'custom': '自定义'
            };
            chartPeriodLabel.textContent = periodMap[currentFilter] || '自定义';

            // Record list
            renderRecordList();

            // Chart
            loadChartData();
        }

        function renderRecordList() {
            if (transactions.length === 0) {
                recordListEl.innerHTML = `
                    <div class="record-empty">
                        <span class="big-icon">📭</span>
                        还没有记录，快来添加第一笔吧！
                    </div>
                `;
                return;
            }

            const sorted = [...transactions].sort((a, b) =>
                b.transaction_date.localeCompare(a.transaction_date) ||
                new Date(b.created_at) - new Date(a.created_at)
            );

            let html = '';
            sorted.forEach(t => {
                const isIncome = t.category_type === 'income';
                const badge = isIncome ? 'income' : 'expense';
                const icon = isIncome ? '📈' : '📉';
                const amountClass = isIncome ? 'income' : 'expense';
                const amtSign = isIncome ? '+' : '-';
                const note = t.description || '';
                html += `
                    <div class="record-item" data-id="${t.id}">
                        <div class="type-badge ${badge}">${icon}</div>
                        <div class="info">
                            <div class="top">
                                <span class="category">${t.category_name || '未分类'}</span>
                                <span class="date">${t.transaction_date}</span>
                            </div>
                            ${note ? `<div class="note">${escapeHtml(note)}</div>` : ''}
                        </div>
                        <div class="amount ${amountClass}">${amtSign}${formatCurrency(t.amount).replace('¥', '')}</div>
                        <button class="delete-btn" data-id="${t.id}" title="删除">✕</button>
                    </div>
                `;
            });
            recordListEl.innerHTML = html;

            recordListEl.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (!confirm('确定要删除这笔记录吗？')) return;
                    try {
                        await apiDelete(`/transactions/${id}`);
                        showToast('✅ 删除成功');
                        await loadData();
                    } catch (err) {
                        showToast('⚠️ 删除失败: ' + err.message);
                    }
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // 图表渲染 (Canvas)
        // ============================================================
        function renderChart(data, groupBy) {
            const canvas = chartCanvas;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = chartWrapper.getBoundingClientRect();
            const W = rect.width || 600;
            const H = rect.height || 200;

            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.scale(dpr, dpr);

            if (!data || data.length === 0) {
                chartEmpty.style.display = 'flex';
                canvas.style.display = 'none';
                return;
            }

            chartEmpty.style.display = 'none';
            canvas.style.display = 'block';

            const pad = { top: 24, bottom: 30, left: 10, right: 10 };
            const chartW = W - pad.left - pad.right;
            const chartH = H - pad.top - pad.bottom;
            const count = data.length;

            let maxVal = 0;
            data.forEach(d => {
                maxVal = Math.max(maxVal, d.income || 0, d.expense || 0);
            });
            maxVal = maxVal * 1.15 || 1;

            const barGap = Math.max(2, chartW / count * 0.25);
            const barWidth = Math.max(4, (chartW - barGap * (count + 1)) / count);

            ctx.clearRect(0, 0, W, H);

            // 背景网格
            ctx.strokeStyle = '#E8ECF0';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (chartH / 4) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(W - pad.right, y);
                ctx.stroke();
                ctx.fillStyle = '#94A3B8';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(formatCurrency(maxVal * (1 - i / 4)), pad.left - 4, y + 3);
            }

            // 柱状图
            data.forEach((d, idx) => {
                const x = pad.left + barGap + idx * (barWidth + barGap);
                const incomeH = ((d.income || 0) / maxVal) * chartH;
                const expenseH = ((d.expense || 0) / maxVal) * chartH;

                if (d.expense > 0) {
                    const ex = x;
                    const ey = pad.top + chartH - expenseH;
                    const ew = barWidth / 2 - 1;
                    ctx.fillStyle = '#EF4444';
                    ctx.beginPath();
                    ctx.roundRect(ex, ey, ew, expenseH, [2, 2, 0, 0]);
                    ctx.fill();
                }

                if (d.income > 0) {
                    const ix = x + barWidth / 2 + 1;
                    const iy = pad.top + chartH - incomeH;
                    const iw = barWidth / 2 - 1;
                    ctx.fillStyle = '#22C55E';
                    ctx.beginPath();
                    ctx.roundRect(ix, iy, iw, incomeH, [2, 2, 0, 0]);
                    ctx.fill();
                }

                // 日期标签
                ctx.fillStyle = '#64748B';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                let label = d.date;
                if (groupBy === 'day') {
                    label = d.date.slice(5);
                }
                const step = Math.max(1, Math.floor(count / 12));
                if (idx % step === 0 || idx === count - 1) {
                    ctx.fillText(label, x + barWidth / 2, H - 4);
                }
            });

            // 图例
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#22C55E';
            ctx.fillRect(W - 70, 8, 10, 10);
            ctx.fillStyle = '#1E293B';
            ctx.fillText('收入', W - 56, 17);
            ctx.fillStyle = '#EF4444';
            ctx.fillRect(W - 28, 8, 10, 10);
            ctx.fillStyle = '#1E293B';
            ctx.fillText('支出', W - 14, 17);
        }

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = Array.isArray(radii) ? radii : [radii, radii, radii, radii];
                const [tl, tr, br, bl] = r.map(v => Math.min(v || 0, Math.min(w, h) / 2));
                this.moveTo(x + tl, y);
                this.lineTo(x + w - tr, y);
                this.quadraticCurveTo(x + w, y, x + w, y + tr);
                this.lineTo(x + w, y + h - br);
                this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
                this.lineTo(x + bl, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - bl);
                this.lineTo(x, y + tl);
                this.quadraticCurveTo(x, y, x + tl, y);
                this.closePath();
                return this;
            };
        }

        // ============================================================
        // 事件绑定
        // ============================================================
        function setupEventListeners() {
            // 类型切换
            typeToggle.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    typeToggle.querySelectorAll('button').forEach(b => { b.className = ''; });
                    const type = btn.dataset.type;
                    currentType = type;
                    btn.className = type === 'income' ? 'active-income' : 'active-expense';
                    updateCategorySelect();
                });
            });

            // 表单提交
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const category_id = categorySelect.value;
                const amount = amountInput.value.trim();
                const transaction_date = dateInput.value;
                const description = noteInput.value.trim();

                if (!category_id) {
                    showToast('⚠️ 请选择分类');
                    return;
                }
                if (!amount || parseFloat(amount) <= 0) {
                    showToast('⚠️ 请输入有效金额');
                    amountInput.focus();
                    return;
                }
                if (!transaction_date) {
                    showToast('⚠️ 请选择日期');
                    dateInput.focus();
                    return;
                }

                try {
                    const result = await apiPost('/transactions', {
                        category_id: parseInt(category_id),
                        amount: parseFloat(amount),
                        transaction_date,
                        description: description || null
                    });
                    showToast('✅ 添加成功');
                    amountInput.value = '';
                    noteInput.value = '';
                    dateInput.value = getTodayStr();
                    await loadData();
                } catch (err) {
                    showToast('⚠️ 添加失败: ' + err.message);
                }
            });

            // 筛选按钮
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.period;
                    if (currentFilter === 'custom') {
                        // 使用自定义日期
                    } else {
                        const range = getFilterRange();
                        if (range.start) filterStart.value = range.start;
                        if (range.end) filterEnd.value = range.end;
                    }
                    loadData();
                });
            });

            // 自定义筛选
            applyCustom.addEventListener('click', () => {
                if (!filterStart.value || !filterEnd.value) {
                    showToast('⚠️ 请选择开始和结束日期');
                    return;
                }
                if (filterStart.value > filterEnd.value) {
                    showToast('⚠️ 开始日期不能晚于结束日期');
                    return;
                }
                filterBtns.forEach(b => b.classList.remove('active'));
                currentFilter = 'custom';
                loadData();
            });
        }

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            // 设置日期默认值
            const today = new Date();
            dateInput.value = formatDate(today);
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            filterStart.value = formatDate(firstDay);
            filterEnd.value = formatDate(lastDay);

            setupEventListeners();

            // 连接测试
            try {
                const healthRes = await apiGet('/health');
                statusDot.className = 'dot online';
                statusText.textContent = '已连接';
            } catch (err) {
                statusDot.className = 'dot offline';
                statusText.textContent = '连接失败!';
                showToast('⚠️ 后端服务连接失败，请确保 server.js 已启动');
            }

            // 加载分类
            const catLoaded = await loadCategories();
            if (!catLoaded) {
                showToast('⚠️ 无法加载分类数据，请检查数据库连接');
            }

            // 加载交易数据
            await loadData();

            // 窗口resize重新绘制图表
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (transactions.length > 0) loadChartData();
                }, 300);
            });
        }

        // 启动
        init();
    </script>
